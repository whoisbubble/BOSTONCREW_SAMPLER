name: macOS Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  package-macos:
    name: Package macOS ${{ matrix.package_arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_arch: x64
            runner: macos-15-intel
            cmake_arch: x86_64
            deployment_target: "11.0"
            ffmpeg_arch: amd64
            expected_arch: x86_64
          - package_arch: arm64
            runner: macos-15
            cmake_arch: arm64
            deployment_target: "11.0"
            ffmpeg_arch: arm64
            expected_arch: arm64

    env:
      QT_VERSION: "6.5.3"
      CONFIGURATION: Release
      NO_ARCHIVE: "1"
      PACKAGE_ARCH: macos-${{ matrix.package_arch }}
      CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmake_arch }}
      CMAKE_OSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      FFMPEG_ARCH: ${{ matrix.ffmpeg_arch }}
      EXPECTED_ARCH: ${{ matrix.expected_arch }}
      EXPECTED_MIN_SYSTEM_VERSION: ${{ matrix.deployment_target }}
      MACOS_NOTARIZE: auto
      EXPECT_NOTARIZED: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && '1' || '0' }}
      DMG_PATH: deploy/BOSTONCREW-SAMPLER-macos-${{ matrix.package_arch }}.dmg
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report macOS signing mode
        shell: bash
        run: |
          if [ "$EXPECT_NOTARIZED" = "1" ]; then
            echo "Apple Developer ID secrets are configured. The DMG will be signed and notarized."
          else
            echo "::warning::Apple Developer ID secrets are not configured. Building an unsigned macOS package with a first-run quarantine helper."
          fi

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia
          cache: true

      - name: Import Apple Developer ID certificate
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build, test, and package
        shell: bash
        run: bash scripts/deploy_macos.sh

      - name: Validate package
        shell: bash
        run: bash scripts/validate_macos_package.sh

      - name: Upload macOS artifact (attempt 1)
        id: upload_artifact_1
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: BOSTONCREW-SAMPLER-macos-${{ matrix.package_arch }}
          path: |
            ${{ env.DMG_PATH }}
            deploy/macos/BOSTONCREW-SAMPLER.app
          if-no-files-found: error
          compression-level: 0
          overwrite: true

      - name: Wait before artifact upload retry 2
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.upload_artifact_1.outcome == 'failure' }}
        shell: bash
        run: sleep 30

      - name: Upload macOS artifact (attempt 2)
        id: upload_artifact_2
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.upload_artifact_1.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: BOSTONCREW-SAMPLER-macos-${{ matrix.package_arch }}
          path: |
            ${{ env.DMG_PATH }}
            deploy/macos/BOSTONCREW-SAMPLER.app
          if-no-files-found: error
          compression-level: 0
          overwrite: true

      - name: Wait before artifact upload retry 3
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.upload_artifact_1.outcome == 'failure' && steps.upload_artifact_2.outcome == 'failure' }}
        shell: bash
        run: sleep 60

      - name: Upload macOS artifact (attempt 3)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.upload_artifact_1.outcome == 'failure' && steps.upload_artifact_2.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: BOSTONCREW-SAMPLER-macos-${{ matrix.package_arch }}
          path: |
            ${{ env.DMG_PATH }}
            deploy/macos/BOSTONCREW-SAMPLER.app
          if-no-files-found: error
          compression-level: 0
          overwrite: true

      - name: Publish tag release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
              gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber && exit 0
            else
              gh release create "$GITHUB_REF_NAME" "$DMG_PATH" --title "$GITHUB_REF_NAME" --notes "macOS builds" && exit 0
              gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
                && gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber \
                && exit 0
            fi
            sleep $((attempt * 30))
          done
          exit 1
