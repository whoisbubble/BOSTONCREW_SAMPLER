name: macOS Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  package-macos:
    name: Package macOS ${{ matrix.package_arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_arch: x64
            runner: macos-15-intel
            cmake_arch: x86_64
            ffmpeg_arch: amd64
            expected_arch: x86_64
          - package_arch: arm64
            runner: macos-15
            cmake_arch: arm64
            ffmpeg_arch: arm64
            expected_arch: arm64

    env:
      QT_VERSION: "6.10.2"
      CONFIGURATION: Release
      PACKAGE_ARCH: macos-${{ matrix.package_arch }}
      CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmake_arch }}
      CMAKE_OSX_DEPLOYMENT_TARGET: "13.0"
      FFMPEG_ARCH: ${{ matrix.ffmpeg_arch }}
      EXPECTED_ARCH: ${{ matrix.expected_arch }}
      ARCHIVE_PATH: deploy/BOSTONCREW-SAMPLER-macos-${{ matrix.package_arch }}.zip
      DMG_PATH: deploy/BOSTONCREW-SAMPLER-macos-${{ matrix.package_arch }}.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia
          cache: true

      - name: Build, test, and package
        shell: bash
        run: bash scripts/deploy_macos.sh

      - name: Validate package
        shell: bash
        run: bash scripts/validate_macos_package.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: BOSTONCREW-SAMPLER-macos-${{ matrix.package_arch }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  publish-release:
    name: Publish macOS release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: package-macos
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: BOSTONCREW-SAMPLER-macos-*
          path: release-assets
          merge-multiple: true

      - name: Publish tag release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/*.zip --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/*.zip --title "$GITHUB_REF_NAME" --notes "macOS builds"
          fi
